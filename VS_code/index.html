<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Cup Predictor</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <h1>World Cup Predictor 2026</h1>
    <p>Make predictions. Beat your friends. Beat the AI Bot 🤖</p>
  </header>

  <main class="container">

    <!-- CONTROLS BAR -->
    <section class="controls card">
      
      <div class="controls-row">
        <div class="controls-left">
          <label>Your name:</label>
          <input id="predictor-name" placeholder="Enter your name">
          
          <button id="save-predictions" class="primary">Save</button>
        </div>

        <div class="controls-right">
          <button id="filter-all">All</button>
          <button id="filter-played">Played</button>
          <button id="filter-unplayed">Upcoming</button>

          <select id="game-day-select"></select>

          <button id="refresh-ai" class="ai-button">Refresh AI 🤖</button>
        </div>
      </div>

    </section>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- MATCHES -->
      <section class="card matches">
        <h2>Matches</h2>
        <div id="matches-list">Loading matches...</div>
      </section>

      <!-- LEADERBOARD -->
      <section class="card leaderboard">
        <h2>Leaderboard</h2>
        <div id="leaderboard-list">
          No predictions yet.
        </div>
      </section>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Built for World Cup 2026 ⚽</p>
  </footer>

  <script src="js/app.js" type="module"></script>

</body>
</html>
