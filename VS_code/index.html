<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Cup Predictor</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- TOP NAV -->
  <header class="topbar">
    <div class="logo">
      <span class="logo-box">26</span>
      <div class="logo-text">
        <strong>GOAL CALL</strong>
        <span>World Cup 2026</span>
      </div>
    </div>

    <nav class="nav-tabs">
      <button class="active">Today</button>
      <button>Fixtures</button>
      <button>Leaderboard</button>
    </nav>

    <div class="user-controls">
      <input id="predictor-name" placeholder="Set your name">
      <button id="save-predictions">Save</button>
    </div>
  </header>

  <main class="container">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-left">
        <div class="hero-sub">FIFA WORLD CUP 2026</div>

        <h1>
          PICK EVERY MATCH.<br>
          <span>BEAT THE BOT.</span>
        </h1>

        <p>
          1 point for the winner, 1 for goal difference, 1 for exact score.
          Lock in your predictions and outscore your friends.
        </p>

        <div class="hero-buttons">
          <button class="primary">Make picks</button>
          <button>Leaderboard</button>
        </div>
      </div>
    </section>

    <!-- FILTER BAR -->
    <section class="controls">
      <button id="filter-all">All</button>
      <button id="filter-played">Played</button>
      <button id="filter-unplayed">Upcoming</button>

      <select id="game-day-select"></select>

      <button id="refresh-ai" class="ai-button">Refresh AI 🤖</button>
    </section>

    <!-- MATCHES -->
    <section class="matches">
      <div class="section-header">
        <h2>Today</h2>
        <span class="link">All fixtures →</span>
      </div>

      <div id="matches-list">Loading matches...</div>
    </section>

    <!-- LEADERBOARD -->
    <section class="leaderboard">
      <div class="section-header">
        <h2>Top of the table</h2>
        <span class="link">Full leaderboard →</span>
      </div>

      <div id="leaderboard-list">No predictions yet.</div>
    </section>

  </main>

  <script src="js/app.js"></script>

</body>
</html>
