<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Cup Predictor</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header class="site-header">
    <h1>WORLD CUP PREDICTOR</h1>
    <p>Make your predictions!</p>
  </header>

  <main class="container">

    <!-- ✅ MATCHES -->
    <section class="card">
      <h2>Matches</h2>

      <!-- ✅ Predictor input -->
      <div style="margin-bottom:15px;">
        <label><strong>Your name:</strong></label>
        <input id="predictor-name" placeholder="Enter your name" style="padding:8px;margin-left:10px;">
        <button id="save-predictions">Save Predictions</button>
      </div>

      <!-- ✅ Filters -->
      <div style="margin-bottom:15px; display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
        <button id="filter-all">All</button>
        <button id="filter-played">Played</button>
        <button id="filter-unplayed">Unplayed</button>
        <select id="game-day-select" style="margin-left:10px;">
          <option value="">All days</option>
        </select>
        <button id="save-results" style="margin-left:auto;">Save Results</button>
      </div>

      <!-- ✅ Matches go here -->
      <div id="matches-list">Loading matches...</div>

    </section>

    <!-- ✅ LEADERBOARD -->
    <section class="card">
      <h2>Leaderboard</h2>
      <div id="leaderboard-list">
        No predictions yet.
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Designed with football spirit.</p>
  </footer>

  <!-- ✅ IMPORTANT: this links your JavaScript -->
  <script src="js/app.js" type="module"></script>

</body>
</html>
