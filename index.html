<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>World Cup Predictor</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; background:#281000; color:#fff3d1; display:flex; align-items:center; justify-content:center; height:100vh; margin:0 }
      .container { text-align:center; padding:28px; background:rgba(255,159,64,0.06); border-radius:12px }
      h1 { margin:0 0 18px; color:#ffb75b }
      .btn { background:linear-gradient(135deg,#ff9f3c 0%,#ffb75b 100%); color:#2f1200; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer; font-size:1rem }
      .btn:active { transform:translateY(1px) }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>World Cup Predictor</h1>
      <p>Open the full prediction league app below.</p>
      <button class="btn" id="open-app">Open Prediction League</button>
    </div>

    <script>
      document.getElementById('open-app').addEventListener('click', function() {
        // Redirect to the app index page in the same folder
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
